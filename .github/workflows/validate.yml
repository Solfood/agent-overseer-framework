name: Validate Overseer Framework

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate framework
        run: |
          python3 -m py_compile tools/validate_overseer_framework.py
          python3 tools/validate_overseer_framework.py
